name: 部署到 GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 同步 index.html
        run: |
          cp coffee.html index.html
          git config user.name "brew-insight-bot"
          git config user.email "bot@brew-insight.com"
          git add index.html
          git diff --quiet || {
            git commit -m "📊 同步 index.html $(date +'%Y-%m-%d')"
            git push
          }
