name: 每日数据刷新

on:
  schedule:
    - cron: '0 2,8 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 尝试刷新数据（失败则使用现有数据）
        run: |
          python refresh.py || echo "⚠️ 数据刷新跳过，使用现有内容"

      - name: 提交并推送代码
        run: |
          git config user.name "brew-insight-bot"
          git config user.email "bot@brew-insight.com"
          git add coffee.html
          git diff --quiet && git diff --staged --quiet && echo "无更新" || {
            git commit -m "📊 数据自动刷新 $(date +'%Y-%m-%d %H:%M')"
            git push
          }

      - name: 准备 Pages 部署文件
        run: |
          cp coffee.html index.html
          mkdir -p _site
          cp index.html _site/

      - name: 上传 Pages 工件
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: 部署到 GitHub Pages
        uses: actions/deploy-pages@v4
