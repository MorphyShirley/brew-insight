name: 每日数据刷新

on:
  schedule:
    - cron: '0 2,8 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 刷新数据并准备部署
        run: |
          python refresh.py || echo "⚠️ 刷新未完成，使用现有数据"
          cp coffee.html index.html 2>/dev/null || cp index.html index.html 2>/dev/null || true
          mkdir -p _site
          cp index.html _site/ 2>/dev/null || echo "no index"

      - name: 上传 Pages 工件
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
