name: 每日数据刷新

on:
  schedule:
    # 每天 UTC 2:00 和 8:00（北京时间 10:00 和 16:00）各执行一次
    - cron: '0 2,8 * * *'
  workflow_dispatch:  # 支持手动触发
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 刷新数据
        run: python refresh.py

      - name: 提交更新
        run: |
          git config user.name "brew-insight-bot"
          git config user.email "bot@brew-insight.surge.sh"
          git add coffee.html
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "📊 每日数据自动刷新 $(date +'%Y-%m-%d %H:%M')"

      - name: 推送到 GitHub
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main

      - name: 部署到 Surge.sh
        run: |
          npm install -g surge
          cp coffee.html index.html
          surge ./ brew-insight.surge.sh \
            --token ${{ secrets.SURGE_TOKEN }}
