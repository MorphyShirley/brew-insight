name: 每日数据刷新

on:
  schedule:
    - cron: '0 2,8 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 尝试刷新数据（失败则跳过）
        run: |
          python refresh.py || echo "⚠️ 数据刷新跳过"

      - name: 生成并提交 index.html
        run: |
          cp coffee.html index.html
          git config user.name "brew-insight-bot"
          git config user.email "bot@brew-insight.com"
          git add coffee.html index.html
          git diff --quiet && git diff --staged --quiet && echo "无更新" || {
            git commit -m "📊 数据自动刷新 $(date +'%Y-%m-%d %H:%M')"
            git push
          }
