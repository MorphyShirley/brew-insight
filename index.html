<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>饮力情报局 · 咖啡茶饮行业热点聚合</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
    body { -webkit-overflow-scrolling: touch; touch-action: manipulation; }
    body {
      font-family: 'Inter', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #080c18;
      color: #e0e6f0;
      line-height: 1.6;
    }

    /* ── Layout ── */
    .app { display: flex; min-height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px; flex-shrink: 0;
      background: #0c1120;
      border-right: 1px solid rgba(59,130,246,.12);
      padding: 28px 20px;
      position: sticky; top: 0; height: 100vh;
      overflow-y: auto;
      display: flex; flex-direction: column;
      box-shadow: 2px 0 30px rgba(59,130,246,.04);
    }
    .sidebar-logo {
      font-size: 20px; font-weight: 800; letter-spacing: -.3px;
      display: flex; align-items: center; gap: 10px;
      padding-bottom: 24px; margin-bottom: 24px;
      border-bottom: 1px solid rgba(59,130,246,.1);
      color: #e0e6f0;
    }
    .sidebar-logo span { color: #60a5fa; }
    .sidebar-logo .badge {
      font-size: 9px; font-weight: 700; letter-spacing: .5px;
      background: linear-gradient(135deg, #3b82f6, #60a5fa);
      color: #fff;
      padding: 2px 8px; border-radius: 100px;
      margin-left: 4px;
      box-shadow: 0 0 12px rgba(59,130,246,.4);
    }
    .sidebar nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .sidebar nav a {
      padding: 10px 14px; border-radius: 10px;
      text-decoration: none; color: #8892a8; font-size: 14px; font-weight: 500;
      display: flex; align-items: center; gap: 10px;
      transition: all .2s;
    }
    .sidebar nav a:hover { background: rgba(59,130,246,.08); color: #e0e6f0; }
    .sidebar nav a.active {
      background: linear-gradient(135deg, rgba(59,130,246,.15), rgba(96,165,250,.08));
      color: #60a5fa;
      box-shadow: inset 0 0 20px rgba(59,130,246,.06);
    }
    .sidebar nav a .icon { font-size: 18px; width: 24px; text-align: center; }
    .sidebar-nav-label {
      font-size: 11px; font-weight: 600; letter-spacing: 1px;
      color: #4a5568; margin: 16px 0 8px 14px; text-transform: uppercase;
    }

    .sidebar-footer {
      margin-top: auto; padding-top: 16px;
      border-top: 1px solid rgba(59,130,246,.1);
      font-size: 12px; color: #4a5568;
    }
    .sidebar-footer .user {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px; border-radius: 10px;
      cursor: pointer; transition: background .2s;
    }
    .sidebar-footer .user:hover { background: rgba(59,130,246,.06); }
    .sidebar-footer .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #60a5fa);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px;
      box-shadow: 0 0 16px rgba(59,130,246,.3);
    }

    /* ── Main ── */
    .main {
      flex: 1; min-width: 0;
      padding: 32px 40px 60px;
      max-width: 1100px;
    }

    /* ── Top bar ── */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
    }
    .top-bar h1 {
      font-size: 26px; font-weight: 800; letter-spacing: -.5px;
      color: #e0e6f0;
    }
    .top-bar h1 small {
      font-size: 14px; font-weight: 400; color: #4a5568;
      margin-left: 12px;
    }
    .top-bar-actions {
      display: flex; align-items: center; gap: 12px;
    }
    .top-bar-actions .date-display {
      font-size: 13px; color: #8892a8; font-weight: 500;
      background: #0c1120; padding: 8px 16px; border-radius: 100px;
      border: 1px solid rgba(59,130,246,.12);
    }
    .btn-icon {
      width: 38px; height: 38px; border-radius: 10px;
      border: 1px solid rgba(59,130,246,.12); background: #0c1120;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px; color: #8892a8;
      transition: all .2s;
    }
    .btn-icon:hover { background: rgba(59,130,246,.1); border-color: #3b82f6; color: #60a5fa; }

    /* ── Hot Topic Hero ── */
    .hot-hero {
      background: linear-gradient(135deg, #0f1a2e 0%, #1a2740 50%, #0f1a2e 100%);
      border-radius: 20px;
      padding: 32px 36px;
      color: #e0e6f0;
      margin-bottom: 28px;
      position: relative; overflow: hidden;
      border: 1px solid rgba(59,130,246,.15);
      box-shadow: 0 0 40px rgba(59,130,246,.06), inset 0 0 60px rgba(59,130,246,.03);
    }
    .hot-hero::before {
      content: ''; position: absolute; top: -60%; right: -10%;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(59,130,246,.12) 0%, transparent 70%);
      border-radius: 50%;
    }
    .hot-hero::after {
      content: ''; position: absolute; bottom: -30%; left: 20%;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(96,165,250,.06) 0%, transparent 70%);
      border-radius: 50%;
    }
    .hot-hero .label {
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: #60a5fa; margin-bottom: 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .hot-hero .label .fire { font-size: 16px; }
    .hot-hero h2 {
      font-size: 22px; font-weight: 700; margin-bottom: 10px;
      position: relative; z-index: 1;
    }
    .hot-hero .meta {
      font-size: 13px; color: rgba(255,255,255,.5);
      display: flex; align-items: center; gap: 16px;
      position: relative; z-index: 1;
    }
    .hot-hero .meta .tag {
      background: rgba(59,130,246,.2); color: #60a5fa;
      padding: 2px 10px; border-radius: 100px; font-size: 11px; font-weight: 600;
    }
    .hot-hero .sources {
      display: flex; gap: 6px; flex-wrap: wrap; margin-top: 14px;
      position: relative; z-index: 1;
    }
    .hot-hero .sources span {
      font-size: 11px; color: rgba(255,255,255,.35);
      background: rgba(255,255,255,.04);
      padding: 3px 10px; border-radius: 6px;
      border: 1px solid rgba(255,255,255,.04);
    }

    /* ── Filter tabs ── */
    .filter-bar {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .filter-bar .filter-label {
      font-size: 12px; font-weight: 600; color: #4a5568;
      letter-spacing: .5px; text-transform: uppercase;
      margin-right: 4px;
    }
    .filter-btn {
      padding: 6px 16px; border-radius: 100px;
      border: 1px solid rgba(59,130,246,.12); background: #0c1120;
      font-size: 13px; font-weight: 500; color: #8892a8;
      cursor: pointer; transition: all .2s;
    }
    .filter-btn:hover { border-color: rgba(59,130,246,.3); color: #60a5fa; }
    .filter-btn.active {
      background: linear-gradient(135deg, #3b82f6, #60a5fa);
      color: #fff; border-color: transparent;
      box-shadow: 0 0 20px rgba(59,130,246,.25);
    }

    /* ── News card ── */
    .news-card {
      background: #0c1120;
      border-radius: 16px;
      padding: 24px 28px;
      margin-bottom: 16px;
      transition: all .25s;
      border: 1px solid rgba(59,130,246,.06);
      box-shadow: 0 1px 0 rgba(59,130,246,.04);
    }
    .news-card:hover {
      border-color: rgba(59,130,246,.15);
      box-shadow: 0 0 24px rgba(59,130,246,.06), 0 4px 20px rgba(0,0,0,.2);
    }
    .news-card .card-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px;
    }
    .news-card .brand-icon {
      width: 24px; height: 24px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .news-card .brand-name {
      font-size: 13px; font-weight: 600; color: #4a5568;
    }
    .news-card .time {
      font-size: 12px; color: #4a5568; margin-left: auto;
    }
    .news-card .score {
      font-size: 11px; font-weight: 700; color: #60a5fa;
      background: rgba(59,130,246,.1); padding: 2px 10px; border-radius: 100px;
      margin-left: 8px;
    }
    .news-card h3 {
      font-size: 17px; font-weight: 700;
      margin-bottom: 8px; line-height: 1.4;
    }
    .news-card h3 a {
      text-decoration: none; color: #e0e6f0;
    }
    .news-card h3 a:hover { color: #60a5fa; }
    .news-card p {
      font-size: 14px; color: #6b7a92;
      line-height: 1.7; margin-bottom: 12px;
    }
    .news-card .card-footer {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .news-card .tag {
      font-size: 11px; font-weight: 600;
      padding: 2px 10px; border-radius: 100px;
      background: rgba(59,130,246,.08); color: #8892a8;
    }
    .news-card .tag.tag-red { background: rgba(239,68,68,.12); color: #f87171; }
    .news-card .tag.tag-green { background: rgba(34,197,94,.12); color: #4ade80; }
    .news-card .tag.tag-blue { background: rgba(59,130,246,.12); color: #60a5fa; }
    .news-card .tag.tag-gold { background: rgba(234,179,8,.12); color: #facc15; }

    /* ── Section separator ── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin: 36px 0 16px;
    }
    .section-header h3 {
      font-size: 18px; font-weight: 700;
      color: #e0e6f0;
    }
    .section-header a {
      font-size: 13px; color: #60a5fa; text-decoration: none;
      font-weight: 500;
    }
    .section-header a:hover { text-decoration: underline; }

    /* ── Side right panel (in main) ── */
    .main-grid {
      display: grid; grid-template-columns: 1fr 300px; gap: 28px;
      align-items: start;
    }
    .main-content { min-width: 0; }
    .side-panel {
      position: sticky; top: 28px;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
      align-self: start;
    }
    .side-panel::-webkit-scrollbar { width: 4px; }
    .side-panel::-webkit-scrollbar-thumb { background: rgba(59,130,246,.15); border-radius: 2px; }

    /* ── Trend card ── */
    .trend-card {
      background: #0c1120; border-radius: 16px; padding: 24px;
      margin-bottom: 20px;
      border: 1px solid rgba(59,130,246,.06);
    }
    .trend-card .trend-title {
      font-size: 14px; font-weight: 700; margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
      color: #e0e6f0;
    }
    .trend-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(59,130,246,.06);
    }
    .trend-item:last-child { border-bottom: none; }
    .trend-rank {
      width: 24px; font-size: 13px; font-weight: 700; color: #4a5568;
      text-align: center;
    }
    .trend-rank.top3 { color: #60a5fa; }
    .trend-info { flex: 1; min-width: 0; }
    .trend-info .name {
      font-size: 14px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: #e0e6f0;
    }
    .trend-info .stat {
      font-size: 12px; color: #4a5568;
    }
    .trend-info .stat .up { color: #f87171; }
    .trend-info .stat .down { color: #4ade80; }
    .trend-heat {
      font-size: 12px; color: #60a5fa; font-weight: 600;
    }

    /* ── Quick insight ── */
    .insight-card {
      background: linear-gradient(135deg, #0f1a2e, #0c1120);
      border-radius: 16px; padding: 24px;
      margin-bottom: 20px;
      border: 1px solid rgba(59,130,246,.1);
      box-shadow: inset 0 0 30px rgba(59,130,246,.03);
    }
    .insight-card .insight-title {
      font-size: 14px; font-weight: 700; margin-bottom: 12px;
      color: #e0e6f0;
    }
    .insight-card p {
      font-size: 13px; color: #6b7a92; line-height: 1.7;
    }
    .insight-card .highlight {
      color: #60a5fa; font-weight: 600;
    }

    /* ── Calendar card ── */
    .cal-card {
      background: #0c1120; border-radius: 16px; padding: 24px;
      margin-bottom: 20px;
      border: 1px solid rgba(59,130,246,.06);
    }
    .cal-card .cal-title {
      font-size: 14px; font-weight: 700; margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
      color: #e0e6f0;
    }
    .cal-item {
      display: flex; gap: 12px; padding: 8px 0;
      border-bottom: 1px solid rgba(59,130,246,.06);
    }
    .cal-item:last-child { border-bottom: none; }
    .cal-item .cal-date {
      font-size: 12px; font-weight: 700; color: #60a5fa;
      width: 40px; flex-shrink: 0; text-align: center;
    }
    .cal-item .cal-info { font-size: 13px; color: #6b7a92; }

    /* ── Journal / Daily digest ── */
    .daily-section {
      margin-top: 40px;
    }
    .daily-section .daily-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 20px;
    }
    .daily-section .daily-header h3 {
      font-size: 18px; font-weight: 700;
      color: #e0e6f0;
    }
    .daily-section .daily-header .sub {
      font-size: 13px; color: #4a5568;
    }

    /* ── Responsive ── */
    @media (max-width: 1024px) {
      .sidebar { display: none; }
      .mobile-nav { display: flex !important; }
      .main { padding: 24px 20px 80px; }
      .main-grid { grid-template-columns: 1fr; }
      .side-panel { position: static; }
    }
    @media (max-width: 640px) {
      .hot-hero { padding: 16px; }
      .hot-hero h2 { font-size: 15px !important; }
      .news-card { padding: 14px 16px; }
      .top-bar h1 small { display: block; margin-left: 0; font-size: 12px; }
      .top-bar h1 { font-size: 18px; }
      .top-bar-actions .date-display { font-size: 11px; padding: 4px 10px; }
      .cmp-table { font-size: 10px; }
      .chart-container { padding: 12px; }
      .funnel-row { padding: 6px 10px; }
      .funnel-row .funnel-label { font-size: 11px; }
      .modal { padding: 20px; }
      .stat-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      .trend-card { padding: 16px; }
      .strat-cal { padding: 12px; font-size: 11px; }
      .strat-cal td, .strat-cal th { padding: 6px 8px; }
      .week-report { padding: 12px 14px; }
      .status-bar { font-size: 11px; padding: 6px 10px; flex-wrap: wrap; }
      .cmp-table td, .cmp-table th { padding: 4px 6px; }
      .ai-brief { padding: 12px 14px; }
      .ai-brief .ab-stat { font-size: 16px; }
      .section-header h3 { font-size: 15px; }
      .cmp-table .cmp-brand span { width: 14px !important; height: 14px !important; font-size: 8px !important; }
    }

    /* ── Edge glow animation ── */
    @keyframes edgeGlow {
      0%, 100% { box-shadow: 0 0 15px rgba(59,130,246,.03), 0 0 40px rgba(59,130,246,.02); }
      50% { box-shadow: 0 0 25px rgba(59,130,246,.06), 0 0 60px rgba(59,130,246,.03); }
    }
    .app::before {
      content: ''; position: fixed; top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(59,130,246,.2), rgba(96,165,250,.4), rgba(59,130,246,.2), transparent);
      z-index: 999; pointer-events: none;
    }
    .app::after {
      content: ''; position: fixed; bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(59,130,246,.15), rgba(96,165,250,.3), rgba(59,130,246,.15), transparent);
      z-index: 999; pointer-events: none;
    }

    /* ── Glow border lines on sides ── */
    .sidebar::after {
      content: ''; position: absolute; top: 0; right: -1px;
      width: 1px; height: 100%;
      background: linear-gradient(180deg, transparent, rgba(59,130,246,.15), rgba(96,165,250,.25), rgba(59,130,246,.15), transparent);
    }

    /* ── Chart styles ── */
    .chart-container {
      background: #0c1120; border-radius: 16px; padding: 20px;
      margin-bottom: 20px; border: 1px solid rgba(59,130,246,.06);
    }
    .chart-container .chart-title {
      font-size: 14px; font-weight: 700; color: #e0e6f0;
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .chart-container .chart-sub {
      font-size: 11px; color: #4a5568; margin-left: 8px; font-weight: 400;
    }
    .chart-container canvas {
      width: 100%; height: auto; display: block;
      border-radius: 8px; cursor: crosshair;
    }
    .chart-tooltip {
      position: fixed; pointer-events: none; z-index: 100;
      background: #0f1a2e; border: 1px solid rgba(59,130,246,.2);
      border-radius: 10px; padding: 10px 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,.3);
      opacity: 0; transition: opacity .15s;
      min-width: 140px;
    }
    .chart-tooltip.visible { opacity: 1; }
    .chart-tooltip .tt-name { font-size: 13px; font-weight: 700; color: #e0e6f0; }
    .chart-tooltip .tt-brand { font-size: 11px; color: #60a5fa; margin-top: 2px; }
    .chart-tooltip .tt-row { display: flex; justify-content: space-between; gap: 16px; margin-top: 4px; }
    .chart-tooltip .tt-row span { font-size: 11px; color: #6b7a92; }
    .chart-tooltip .tt-row .tt-val { color: #e0e6f0; font-weight: 600; }
    .chart-legend {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px;
    }
    .chart-legend span {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; color: #6b7a92;
    }
    .chart-legend .dot {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block;
    }

    /* ── Strategy Calendar ── */
    .strat-cal {
      background: #0c1120; border-radius: 16px; padding: 20px;
      margin-bottom: 20px; border: 1px solid rgba(59,130,246,.06);
      overflow-x: auto;
    }
    .strat-cal .sc-title {
      font-size: 14px; font-weight: 700; color: #e0e6f0;
      margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
    }
    .strat-cal .sc-month { font-size: 12px; color: #4a5568; margin-left: auto; font-weight: 400; }
    .strat-cal table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .strat-cal th {
      text-align: left; padding: 10px 12px; font-size: 11px; font-weight: 600;
      color: #4a5568; text-transform: uppercase; letter-spacing: .5px;
      border-bottom: 1px solid rgba(59,130,246,.1);
    }
    .strat-cal td {
      padding: 12px; border-bottom: 1px solid rgba(59,130,246,.04);
      vertical-align: middle;
    }
    .strat-cal tr:hover td { background: rgba(59,130,246,.03); }
    .strat-cal .sc-brand-cell {
      display: flex; align-items: center; gap: 8px; font-weight: 600;
    }
    .strat-cal .sc-brand-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .strat-cal .sc-cat {
      font-size: 10px; padding: 2px 10px; border-radius: 100px;
      background: rgba(59,130,246,.08); color: #6b7a92; white-space: nowrap;
    }
    .strat-cal .sc-cat.expansion { background: rgba(34,197,94,.12); color: #4ade80; }
    .strat-cal .sc-cat.product { background: rgba(59,130,246,.12); color: #60a5fa; }
    .strat-cal .sc-cat.social { background: rgba(234,179,8,.12); color: #facc15; }
    .strat-cal .sc-cat.finance { background: rgba(239,68,68,.12); color: #f87171; }
    .strat-cal .sc-date-cell { white-space: nowrap; color: #6b7a92; font-size: 12px; }

    /* ── Trend Chart ── */
    .trend-chart-wrap {
      background: #0c1120; border-radius: 16px; padding: 20px;
      margin-bottom: 20px; border: 1px solid rgba(59,130,246,.06);
    }
    .trend-chart-wrap .tc-title {
      font-size: 14px; font-weight: 700; color: #e0e6f0;
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .trend-chart-wrap canvas {
      width: 100%; height: auto; display: block; border-radius: 8px;
    }
    .tc-legend {
      display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px;
    }
    .tc-legend span {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; color: #6b7a92;
    }
    .tc-legend .tc-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

    /* ── Funnel ── */
    .funnel {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      margin: 16px 0;
    }
    .funnel-row {
      display: flex; align-items: center; width: 100%;
      padding: 10px 16px; border-radius: 8px;
      background: rgba(59,130,246,.04);

function renderScatterPlot(canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const rect = canvas.parentElement.getBoundingClientRect();
  const w = rect.width - 40;
  const h = Math.min(380, w * 0.55);
  canvas.width = w * 2;
  canvas.height = h * 2;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);

  const pad = { top: 30, right: 20, bottom: 40, left: 48 };
  const pw = w - pad.left - pad.right;
  const ph = h - pad.top - pad.bottom;

  // Data points from PRODUCT_ANALYSIS
  const points = Object.entries(PRODUCT_ANALYSIS).map(([name, d]) => {
    const avgPriceStr = (d.avgPrice || '').replace(/[^0-9.]/g, '');
    const price = parseFloat(avgPriceStr) || 20;
    const rating = (d.scores.口味 + d.scores.包装 + d.scores.性价比 + d.scores.复购意愿 + d.scores.社交传播) / 5;
    const salesRaw = d.sales || '';
    const num = parseFloat(salesRaw.replace(/[^0-9.]/g, '')) || 0;
    let sales = 100;
    if (salesRaw.includes('亿')) sales = num * 100000000;
    else if (salesRaw.includes('千万')) sales = num * 10000000;
    else if (salesRaw.includes('万')) sales = num * 10000;
    else if (num > 0) sales = num;
    return { name, price, rating, sales, brand: d.brand };
  }).filter(p => p.rating > 10 && p.price > 0);

  const xMin = 0, xMax = 65;
  const yMin = 60, yMax = 100;

  function xPos(v) { return pad.left + (v - xMin) / (xMax - xMin) * pw; }
  function yPos(v) { return pad.top + (1 - (v - yMin) / (yMax - yMin)) * ph; }

  // Build positioned points with radii
  const maxSales = Math.max(...points.map(p => p.sales));
  const bubbles = points.map(p => {
    const r = Math.max(6, Math.min(22, Math.sqrt(p.sales / maxSales) * 22));
    return { ...p, x: xPos(p.price), y: yPos(p.rating), r };
  });

  function draw() {
    // Background
    ctx.fillStyle = '#0a0e1a';
    ctx.fillRect(0, 0, w, h);

    // Grid lines
    ctx.strokeStyle = 'rgba(59,130,246,.06)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= 5; i++) {
      const x = pad.left + i / 5 * pw;
      ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, h - pad.bottom); ctx.stroke();
      const y = pad.top + i / 5 * ph;
      ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(w - pad.right, y); ctx.stroke();
    }

    // Axis labels
    ctx.fillStyle = '#4a5568';
    ctx.font = '11px Inter, sans-serif';
    ctx.textAlign = 'center';
    for (let i = 0; i <= 6; i++) {
      const v = xMin + i * 10;
      ctx.fillText(v + '元', pad.left + (v - xMin) / (xMax - xMin) * pw, h - 10);
    }
    ctx.textAlign = 'right';
    for (let i = 0; i <= 4; i++) {
      const v = yMin + i * 10;
      ctx.fillText(v + '', pad.left - 8, yPos(v) + 4);
    }

    // Axis titles
    ctx.fillStyle = '#6b7a92';
    ctx.font = '10px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('价格 (元) →', pad.left + pw / 2, h - 1);
    ctx.save();
    ctx.translate(14, pad.top + ph / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText('综合评分 ←', 0, 0);
    ctx.restore();

    // Bubbles
    bubbles.forEach(b => {
      const color = SCATTER_BRAND_COLORS[b.brand] || '#3b82f6';
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fillStyle = color + '30';
      ctx.fill();
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    });

    // Highlighted bubble label (non-overlapping, top-rated)
    const labeled = [...bubbles].sort((a, b) => b.rating - a.rating).slice(0, 8);
    labeled.forEach(b => {
      const overlaps = labeled.some(other =>
        other !== b && Math.hypot(b.x - other.x, b.y - other.y) < (b.r + other.r + 30)
      );
      if (overlaps && b.rating < 86) return;
      ctx.fillStyle = '#8892a8';
      ctx.font = '9px Inter, sans-serif';
      ctx.textAlign = 'center';
      const label = b.name.length > 8 ? b.name.slice(0, 8) + '..' : b.name;
      ctx.fillText(label, b.x, b.y - b.r - 4);
    });
  }

  draw();

  // ── Tooltip element ──
  let tip = document.getElementById('chartTooltip');
  if (!tip) {
    tip = document.createElement('div');
    tip.id = 'chartTooltip';
    tip.className = 'chart-tooltip';
    document.body.appendChild(tip);
  }

  // ── Hover logic ──
  function onMove(e) {
    const cr = canvas.getBoundingClientRect();
    const mx = e.clientX - cr.left;
    const my = e.clientY - cr.top;

    let best = null, bestDist = 30;
    for (const b of bubbles) {
      const d = Math.hypot(mx - b.x, my - b.y);
      if (d < b.r + 8 && d < bestDist) {
        bestDist = d;
        best = b;
      }
    }
    tip._lastBest = best;

    if (best) {
      tip.innerHTML = `
        <div class="tt-name">${best.name}</div>
        <div class="tt-brand">${best.brand}</div>
        <div class="tt-row">
          <span>评分 <span class="tt-val">${best.rating.toFixed(1)}</span></span>
          <span>价格 <span class="tt-val">${best.price}元</span></span>
        </div>
      `;
      tip.style.left = (e.clientX + 14) + 'px';
      tip.style.top = (e.clientY - 10) + 'px';
      tip.classList.add('visible');
      canvas.style.cursor = 'pointer';
    } else {
      tip.classList.remove('visible');
      canvas.style.cursor = 'crosshair';
    }
  }

  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseleave', () => {
    tip.classList.remove('visible');
    canvas.style.cursor = 'crosshair';
  });
  canvas.addEventListener('click', () => {
    if (tip._lastBest) openModal(tip._lastBest.name);
  });
}

function renderTrendChart(canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const cr = canvas.parentElement.getBoundingClientRect();
  const w = Math.max(300, cr.width - 40);
  const h = 260;
  canvas.width = w * 2; canvas.height = h * 2;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);

  const pad = { top: 20, right: 100, bottom: 30, left: 36 };
  const pw = w - pad.left - pad.right, ph = h - pad.top - pad.bottom;
  const yMax = 100, yMin = 0;
  const n = TREND_LABELS.length;

  function xPos(i) { return pad.left + (i / (n - 1)) * pw; }
  function yPos(v) { return pad.top + (1 - (v - yMin) / (yMax - yMin)) * ph; }

  // Smooth bezier control points
  function getBezierPoints(pts) {
    const xs = pts.map((_, i) => xPos(i));
    const ys = pts.map(v => yPos(v));
    const cps = [];
    for (let i = 0; i < pts.length; i++) {
      if (i === 0) cps.push({ cx1: xs[0], cy1: ys[0], cx2: xs[0], cy2: ys[0] });
      else if (i === pts.length - 1) cps.push({ cx1: xs[i], cy1: ys[i], cx2: xs[i], cy2: ys[i] });
      else {
        const t = 0.3;
        cps.push({
          cx1: xs[i] - t * (xs[i+1] - xs[i-1]),
          cy1: ys[i] - t * (ys[i+1] - ys[i-1]),
          cx2: xs[i] + t * (xs[i+1] - xs[i-1]),
          cy2: ys[i] + t * (ys[i+1] - ys[i-1]),
        });
      }
    }
    return { xs, ys, cps };
  }

  ctx.fillStyle = '#0a0e1a'; ctx.fillRect(0, 0, w, h);

  // Grid
  ctx.strokeStyle = 'rgba(59,130,246,.05)'; ctx.lineWidth = .5;
  for (let i = 0; i <= 5; i++) {
    const y = pad.top + i / 5 * ph;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(w - pad.right, y); ctx.stroke();
  }

  // X labels
  ctx.fillStyle = '#4a5568'; ctx.font = '9px Inter,sans-serif'; ctx.textAlign = 'center';
  TREND_LABELS.forEach((l, i) => ctx.fillText(l, xPos(i), h - 4));

  // Y labels (key milestones only)
  ctx.textAlign = 'right'; ctx.font = '9px Inter,sans-serif';
  [0, 25, 50, 75, 100].forEach(v => {
    ctx.fillStyle = '#3a4a5a'; ctx.fillText(v + '%', pad.left - 6, yPos(v) + 3);
  });

  TREND_DATA.forEach((trend) => {
    const { xs, ys, cps } = getBezierPoints(trend.data);
    const pts = trend.data;

    // Smooth curve
    ctx.strokeStyle = trend.color; ctx.lineWidth = 2; ctx.beginPath();
    ctx.moveTo(xs[0], ys[0]);
    for (let i = 1; i < pts.length; i++) {
      ctx.bezierCurveTo(cps[i-1].cx2, cps[i-1].cy2, cps[i].cx1, cps[i].cy1, xs[i], ys[i]);
    }
    ctx.stroke();

    // Dots + labels for each point
    pts.forEach((v, i) => {
      const x = xs[i], y = ys[i];
      // Dot
      ctx.beginPath(); ctx.arc(x, y, 3.5, 0, Math.PI * 2);
      ctx.fillStyle = trend.color; ctx.fill();
      ctx.strokeStyle = '#0a0e1a'; ctx.lineWidth = 1.2; ctx.stroke();
      // Label above dot
      ctx.fillStyle = trend.color; ctx.font = 'bold 9px Inter,sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(v + '%', x, y - 9);
    });
  });

  // Legend on right side
  TREND_DATA.forEach((trend, i) => {
    const ly = pad.top + 16 + i * 20;
    ctx.fillStyle = trend.color; ctx.fillRect(w - pad.right + 4, ly - 3, 10, 10);
    ctx.fillStyle = '#8892a8'; ctx.font = '10px Inter,sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(trend.label, w - pad.right + 18, ly + 5);
  });
}

function tagClass(t) {
  if (t.includes('新品')) return 'tag-green';
  if (t.includes('营销')) return 'tag-red';
  if (t.includes('品牌')||t.includes('行业')||t.includes('出海')) return 'tag-blue';
  if (t.includes('联名')) return 'tag-gold';
  return '';
}

function brandIcon(brand, size) {
  const b = BRANDS[brand] || ['?','#666'];
  const s = size || 24;
  const s2 = s * 2;
  const logoUrl = BRAND_LOGO[brand];
  const clickHandler = `goToBrand('${brand}')`;
  if (logoUrl) {
    return `<img src="${logoUrl}" width="${s}" height="${s}" style="border-radius:5px;flex-shrink:0;object-fit:contain;background:#fff;cursor:pointer;" onclick="${clickHandler}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="${brand}"><span style="display:none;width:${s}px;height:${s}px;border-radius:5px;background:${b[1]};color:#fff;flex-shrink:0;align-items:center;justify-content:center;font-size:${s-8}px;font-weight:700;cursor:pointer;" onclick="${clickHandler}">${b[0]}</span>`;

function renderBrandUniverse(canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const cr = canvas.parentElement.getBoundingClientRect();
  const w = Math.max(200, cr.width - 40);
  const h = Math.min(340, w * 0.95);
  canvas.width = w * 2; canvas.height = h * 2;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d'); ctx.scale(2, 2);

  const cx = w / 2, cy = h / 2;
  const maxR = Math.min(cx, cy) - 30;
  const minHeat = Math.min(...UNIVERSE_BRANDS.map(b => b.heat));
  const maxHeat = Math.max(...UNIVERSE_BRANDS.map(b => b.heat));

  // Stars background
  ctx.fillStyle = '#080c18'; ctx.fillRect(0, 0, w, h);
  for (let i = 0; i < 60; i++) {
    const sx = Math.random() * w, sy = Math.random() * h, sr = Math.random() * 1.5 + 0.3;
    ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.4 + 0.1})`;
    ctx.fill();
  }

  // Central glow
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 25);
  grad.addColorStop(0, 'rgba(59,130,246,.15)');
  grad.addColorStop(1, 'rgba(59,130,246,0)');
  ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(cx, cy, 25, 0, Math.PI*2); ctx.fill();

  // Central text
  ctx.fillStyle = '#60a5fa80'; ctx.font = 'bold 11px Inter,sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('☕ 茶饮宇宙', cx, cy + 4);

  // Orbits
  UNIVERSE_BRANDS.forEach((b, i) => {
    const orbitR = 20 + (i / (UNIVERSE_BRANDS.length - 1)) * (maxR - 20);
    ctx.beginPath(); ctx.arc(cx, cy, orbitR, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(59,130,246,.04)'; ctx.lineWidth = 0.5; ctx.stroke();
  });

  // Store planet positions for click detection
  const planets = [];

  UNIVERSE_BRANDS.forEach((b, i) => {
    const orbitR = 20 + (i / (UNIVERSE_BRANDS.length - 1)) * (maxR - 20);
    const angle = (i / UNIVERSE_BRANDS.length) * Math.PI * 2 - Math.PI / 2;
    const px = cx + orbitR * Math.cos(angle);
    const py = cy + orbitR * Math.sin(angle);
    const planetR = 6 + ((b.heat - minHeat) / (maxHeat - minHeat)) * 12;
    const isActive = _activeBrand === b.name;
    const glowR = isActive ? planetR + 8 : planetR + 3;

    // Glow
    const g = ctx.createRadialGradient(px, py, planetR * 0.3, px, py, glowR);
    g.addColorStop(0, isActive ? `${b.color}60` : `${b.color}25`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(px, py, glowR, 0, Math.PI*2); ctx.fill();

    // Planet body
    const g2 = ctx.createRadialGradient(px - planetR*0.3, py - planetR*0.3, 0, px, py, planetR);
    g2.addColorStop(0, '#fff');
    g2.addColorStop(0.3, b.color);
    g2.addColorStop(1, b.color + 'cc');
    ctx.fillStyle = g2; ctx.beginPath(); ctx.arc(px, py, planetR, 0, Math.PI*2); ctx.fill();

    // Active ring
    if (isActive) {
      ctx.strokeStyle = b.color; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(px, py, planetR + 4, 0, Math.PI*2); ctx.stroke();
      ctx.setLineDash([3, 3]); ctx.strokeStyle = b.color + '60'; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(px, py, planetR + 8, 0, Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
    }

    // Label
    ctx.fillStyle = isActive ? b.color : '#8892a8';
    ctx.font = isActive ? 'bold 10px Inter,sans-serif' : '9px Inter,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`${b.emoji} ${b.name}`, px, py + planetR + 14);
    ctx.fillStyle = '#4a5568'; ctx.font = '8px Inter,sans-serif';
    ctx.fillText(b.heat.toFixed(1), px, py + planetR + 26);

    planets.push({ name: b.name, x: px, y: py, r: planetR + 4 });
  });

  // Click handler
  canvas.onclick = (e) => {
    const r = canvas.getBoundingClientRect();
    const mx = (e.clientX - r.left) * (w / r.width);
    const my = (e.clientY - r.top) * (h / r.height);
    let clicked = null;
    for (const p of planets) {
      if (Math.hypot(mx - p.x, my - p.y) <= p.r + 4) { clicked = p.name; break; }
    }
    _activeBrand = _activeBrand === clicked ? null : clicked;
    // Re-render universe and refresh featured page
    renderBrandUniverse('brandUniverse');
    buildFeaturedAndRender();
  };
}

  if (side) side.innerHTML = f.side;

}

function buildMatrix() {
  const brandStats = {};
  CARDS.forEach(c => {
    if (!brandStats[c.brand]) brandStats[c.brand] = { cards: [], products: [], tags: new Set() };
    brandStats[c.brand].cards.push(c);
    c.tags.forEach(t => brandStats[c.brand].tags.add(t));
  });
  Object.entries(PRODUCT_ANALYSIS).forEach(([k,v]) => {
    if (!brandStats[v.brand]) brandStats[v.brand] = { cards: [], products: [], tags: new Set() };
    brandStats[v.brand].products.push(k);
  });
  const maxCards = Math.max(...Object.values(brandStats).map(b => b.cards.length), 1);
  const sorted = Object.entries(brandStats).sort((a,b) => b[1].cards.length - a[1].cards.length);
  return {
    content: `
      <div style="overflow-x:auto;">

              <td>${stats.cards.length}</td>
              <td><div class="cmp-bar-wrap"><div class="cmp-bar" style="width:${(stats.cards.length/maxCards*100).toFixed(0)}%"></div></div></td>
              <td>${stats.products.length}</td>
              <td style="font-size:11px;color:#6b7a92;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${recent ? recent.title.slice(0,30)+'…' : '-'}</td>

  };
}

// ═══ PRICE DISTRIBUTION CHART ═══
function renderPriceChart(canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const bands = [['0-9元',0,9],['10-14元',10,14],['15-19元',15,19],['20-29元',20,29],['30-39元',30,39],['40元+',40,100]];
  const counts = bands.map(() => 0);
  Object.values(PRODUCT_ANALYSIS).forEach(v => {
    const p = parseFloat((v.avgPrice||'0').replace(/[^0-9.]/g,'')) || 0;
    bands.forEach((b,i) => { if (p >= b[1] && p <= b[2]) counts[i]++; });
  });
  const max = Math.max(...counts, 1);
  const cr = canvas.parentElement.getBoundingClientRect();
  const w = Math.max(200, cr.width - 40);
  const h = 160;
  canvas.width = w * 2; canvas.height = h * 2;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d'); ctx.scale(2,2);
  ctx.fillStyle = '#0a0e1a'; ctx.fillRect(0,0,w,h);
  const bw = (w - 40) / bands.length;
  bands.forEach((b,i) => {
    const bh = (counts[i]/max) * (h-40);
    const x = 20 + i * bw + 4;
    ctx.fillStyle = ['#3b82f6','#60a5fa','#818cf8','#a78bfa','#c084fc','#e879f9'][i];
    ctx.beginPath(); ctx.roundRect(x, h-20-bh, bw-8, bh, 3); ctx.fill();
    ctx.fillStyle = '#4a5568'; ctx.font = '9px Inter,sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(b[0], x + (bw-8)/2, h-4);
    if (counts[i] > 0) { ctx.fillStyle = '#e0e6f0'; ctx.fillText(counts[i], x + (bw-8)/2, h-20-bh-4); }
  });
}

// ═══ RADAR CHART ═══
function renderRadarChart(canvasId, brand1, brand2) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const allEntries = Object.entries(PRODUCT_ANALYSIS);
  const p1 = allEntries.filter(([,v]) => v.brand === brand1);
  const p2 = allEntries.filter(([,v]) => v.brand === brand2);
  const avg = (entries) => entries.length ? [
    entries.reduce((s,[,v])=>s+v.scores.口味,0)/entries.length,
    entries.reduce((s,[,v])=>s+v.scores.包装,0)/entries.length,
    entries.reduce((s,[,v])=>s+v.scores.性价比,0)/entries.length,
    entries.reduce((s,[,v])=>s+v.scores.复购意愿,0)/entries.length,
    entries.reduce((s,[,v])=>s+v.scores.社交传播,0)/entries.length,
  ] : [0,0,0,0,0];
  const d1 = avg(p1), d2 = avg(p2);
  const labels = ['口味','包装','性价比','复购','社交'];

  const cr = canvas.parentElement.getBoundingClientRect();
  const w = Math.min(300, cr.width - 40);
  const h = w; const cx = w/2, cy = h/2, r = w/2 - 30;
  canvas.width = w*2; canvas.height = h*2;
  canvas.style.width = w+'px'; canvas.style.height = h+'px';
  const ctx = canvas.getContext('2d'); ctx.scale(2,2);
  ctx.fillStyle = '#0a0e1a'; ctx.fillRect(0,0,w,h);

  for (let level = 1; level <= 5; level++) {
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = -Math.PI/2 + (i*2*Math.PI/5);
      const x = cx + (r*level/5)*Math.cos(a), y = cy + (r*level/5)*Math.sin(a);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    } ctx.closePath(); ctx.strokeStyle = 'rgba(59,130,246,.06)'; ctx.lineWidth = .5; ctx.stroke();
  }

  labels.forEach((l,i) => {
    const a = -Math.PI/2 + (i*2*Math.PI/5); ctx.fillStyle='#4a5568'; ctx.font='10px Inter,sans-serif'; ctx.textAlign='center';
    ctx.fillText(l, cx+(r+14)*Math.cos(a), cy+(r+14)*Math.sin(a)+3);
  });

  [d1,d2].forEach((d,di) => {
    const color = di===0 ? '#3b82f6' : '#f5a623';
    ctx.beginPath();
    d.forEach((v,i) => {
      const a = -Math.PI/2 + (i*2*Math.PI/5); const x=cx+(r*v/100)*Math.cos(a), y=cy+(r*v/100)*Math.sin(a);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }); ctx.closePath();
    ctx.fillStyle = color+'20'; ctx.fill(); ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();
  });
}

// ═══ NAVIGATION ═══
function switchPage(pageId) {
  const meta = PAGE_META[pageId];
  if (meta) {
    document.getElementById('pageTitle').innerHTML = `${meta.title} <small style="font-size:14px;font-weight:400;color:#4a5568;margin-left:12px;">${meta.sub}</small>`;
  }
  const builder = PAGE_BUILDERS[pageId];
  if (builder) {
    const { content, side } = builder();
    document.getElementById('pageContent').innerHTML = content;
    document.getElementById('pageSide').innerHTML = side || '';
  }
  setupFilters();
  if (pageId === 'new-products') {
    setTimeout(() => { renderScatterPlot('scatterChart'); renderPriceChart('priceChart'); }, 200);
  }
  if (pageId === 'strategy') {
    setTimeout(() => renderTrendChart('trendChart'), 200);
  }
  refreshSearchSource();
}


const FILTER_MAP = {
  '全部': 'all',
  '🆕 新品': '新品',
  '🎯 营销': '营销活动',
  '📊 战略': '品牌战略',
  '📈 趋势': '行业趋势',
  '🌏 出海': '出海',
};

let emptyMsg = null;

function handleFilter() {
  document.querySelector('.filter-btn.active')?.classList.remove('active');
  this.classList.add('active');
  const filter = FILTER_MAP[this.textContent.trim()] || 'all';
  let visibleCount = 0;
  document.querySelectorAll('.news-card').forEach(card => {
    if (filter === 'all') {
      card.style.display = ''; visibleCount++;
    } else {
      const tags = (card.dataset.tags || '').split(',');
      const match = tags.some(t => t.includes(filter));
      card.style.display = match ? '' : 'none';
      if (match) visibleCount++;
    }
  });
  // remove old empty message
  document.querySelectorAll('.filter-empty').forEach(e => e.remove());
  if (visibleCount === 0 && document.querySelector('.filter-bar')) {
    const msg = document.createElement('div');
    msg.className = 'news-card filter-empty';
    msg.style.cssText = 'text-align:center;padding:40px 20px;color:#4a5568;font-size:14px;';
    msg.textContent = '暂无匹配资讯，试试其他分类';
    document.querySelector('.filter-bar').after(msg);
  }
}

// ═══ SEARCH ═══
function openSearch() {
  const el = document.getElementById('searchModal');
  if (el) el.classList.add('open');
  const inp = document.getElementById('searchInput');
  if (inp) inp.focus();
  doSearch();
}
function closeSearch() {
  const el = document.getElementById('searchModal');
  if (el) el.classList.remove('open');
}
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
function doSearch() {
  if (!searchInput || !searchResults) return;
  const q = searchInput.value.trim().toLowerCase();
  if (!q) { showSearchResults(searchItems.slice(0,10)); return; }
  const matches = searchItems.filter(s =>
    s.label.toLowerCase().includes(q) || (s.brand||'').toLowerCase().includes(q) ||
    (s.tags||[]).some(t=>t.toLowerCase().includes(q))
  ).slice(0,20);
  showSearchResults(matches);
}
function showSearchResults(items) {
  if (!searchResults) return;
  if (items.length === 0) { searchResults.innerHTML = '<div class="search-empty">未找到匹配结果</div>'; return; }
  searchResults.innerHTML = items.map(s => {
    if (s.type === 'product') return `<div class="search-item" onclick="closeSearch();openModal('${s.key}')"><span class="si-brand">${s.brand}</span><span class="si-title">${s.label}</span><span class="si-tag">${s.date||''}</span></div>`;
    return `<div class="search-item"><span class="si-brand">${s.brand}</span><span class="si-title">${s.label.slice(0,50)}${s.label.length>50?'..':''}</span><span class="si-tag">资讯</span></div>`;
  }).join('');
}
if (searchInput) searchInput.addEventListener('input', doSearch);
if (searchInput) searchInput.addEventListener('keydown', e => { if(e.key==='Escape') closeSearch(); });

// ═══ COMPARE ═══
let compareQueue = [];
function addCompare(brand) {
  if (compareQueue.includes(brand)) return;
  if (compareQueue.length >= 2) compareQueue.shift();
  compareQueue.push(brand);
  updateCompareUI();
  const panel = document.getElementById('comparePanel');
  if (panel && compareQueue.length === 1) panel.classList.add('open');
}
function removeCompare(brand) {
  compareQueue = compareQueue.filter(b => b !== brand);
  updateCompareUI();
  const panel = document.getElementById('comparePanel');
  if (panel && compareQueue.length === 0) panel.classList.remove('open');
}
function updateCompareUI() {
  for (let i = 0; i < 2; i++) {
    const slot = document.getElementById('compareSlot' + (i+1));
    if (!slot) continue;
    const brand = compareQueue[i];
    if (brand) { slot.innerHTML = brand + '<span class="cp-remove" onclick="removeCompare(\''+brand+'\')">✕</span>'; slot.className = 'cp-slot filled'; }
    else { slot.textContent = '选择品牌 ' + (i+1); slot.className = 'cp-slot'; }
  }
  const btn = document.getElementById('compareBtn');
  if (btn) btn.className = compareQueue.length === 2 ? 'compare-btn ready' : 'compare-btn';
}
function closeComparePanel() { compareQueue = []; const p = document.getElementById('comparePanel'); if (p) p.classList.remove('open'); }
function openCompareModal() {
  if (compareQueue.length !== 2) return;
  const [b1, b2] = compareQueue;
  const p1 = Object.entries(PRODUCT_ANALYSIS).filter(([,v]) => v.brand === b1);
  const p2 = Object.entries(PRODUCT_ANALYSIS).filter(([,v]) => v.brand === b2);
  const avg = (entries) => entries.length ? (entries.reduce((s,[,v]) => s + ((v.scores.口味+v.scores.包装+v.scores.性价比+v.scores.复购意愿+v.scores.社交传播)/5), 0) / entries.length).toFixed(1) : '-';
  const latest = (entries) => entries.length ? entries.sort((a,b) => b[1].date.localeCompare(a[1].date))[0][1].date : '-';
  const grid = document.getElementById('compareGrid');
  if (!grid) return;
  grid.innerHTML = `
    <div class="compare-col">
      <div class="c-brand" style="color:#3b82f6">${b1}</div>
      <div class="compare-row"><span class="cl">产品数</span><span class="cr">${p1.length}</span></div>
      <div class="compare-row"><span class="cl">平均评分</span><span class="cr">${avg(p1)}</span></div>
      <div class="compare-row"><span class="cl">最新动态</span><span class="cr">${latest(p1)}</span></div>
      <div style="margin-top:12px;font-size:13px;color:#6b7a92;">产品列表：</div>
      ${p1.slice(0,5).map(([k]) => `<div style="font-size:12px;color:#e0e6f0;padding:4px 0;border-bottom:1px solid rgba(59,130,246,.04);">${k}</div>`).join('')}
    </div>
    <div class="compare-col">
      <div class="c-brand" style="color:#f5a623">${b2}</div>
      <div class="compare-row"><span class="cl">产品数</span><span class="cr">${p2.length}</span></div>
      <div class="compare-row"><span class="cl">平均评分</span><span class="cr">${avg(p2)}</span></div>
      <div class="compare-row"><span class="cl">最新动态</span><span class="cr">${latest(p2)}</span></div>
      <div style="margin-top:12px;font-size:13px;color:#6b7a92;">产品列表：</div>
      ${p2.slice(0,5).map(([k]) => `<div style="font-size:12px;color:#e0e6f0;padding:4px 0;border-bottom:1px solid rgba(59,130,246,.04);">${k}</div>`).join('')}
    </div>
  `;
  const m = document.getElementById('compareModal');
  if (m) m.classList.add('open');

function closeCompareModal() { const m = document.getElementById('compareModal'); if (m) m.classList.remove('open'); }

// ═══ AI BRIEF ═══
function generateAIBrief() {
  const entries = Object.entries(PRODUCT_ANALYSIS);
  if (entries.length === 0) return '';
  const brands = [...new Set(entries.map(([,v]) => v.brand))];
  const avgScore = (entries.reduce((s,[,v]) => {
    const sc = v.scores;
    return s + (sc.口味 + sc.包装 + sc.性价比 + sc.复购意愿 + sc.社交传播) / 5;
  }, 0) / entries.length).toFixed(1);
  const latestDate = entries.sort((a,b) => b[1].date.localeCompare(a[1].date))[0][1].date;
  const topBrand = [...brands].map(b => {
    const p = entries.filter(([,v]) => v.brand === b);
    return { brand: b, count: p.length, avg: p.reduce((s,[,v]) => s + ((v.scores.口味+v.scores.包装+v.scores.性价比+v.scores.复购意愿+v.scores.社交传播)/5),0) / p.length };
  }).sort((a,b) => b.avg - a.avg)[0];
  return `
    <div class="ai-brief">
      <div class="ab-label">🤖 AI 简报</div>
      <div class="ab-main">
        <span class="ab-stat">${brands.length}<small>品牌</small></span>
        <span class="ab-divider"></span>
        <span class="ab-stat">${entries.length}<small>产品</small></span>
        <span class="ab-divider"></span>
        <span class="ab-stat">${avgScore}<small>均分</small></span>
        <span class="ab-divider"></span>
        <span class="ab-tag">🔥 ${topBrand.brand}</span>
        <span style="font-size:11px;color:#4a5568;">${latestDate} 更新</span>
      </div>
    </div>
  `;
}

  searchItems.length = 0;
  Object.entries(PRODUCT_ANALYSIS).forEach(([k,v]) => searchItems.push({type:'product',label:k, brand:v.brand, date:v.date, key:k}));

}
